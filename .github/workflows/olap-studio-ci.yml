# OLAP Studio CI/CD 파이프라인
# 트리거: services/olap-studio/** 변경 시
name: OLAP Studio CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/olap-studio/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/olap-studio/**'

env:
  PYTHON_VERSION: "3.12"
  SERVICE_DIR: services/olap-studio

jobs:
  lint:
    name: 코드 품질 검사
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/olap-studio/pyproject.toml

      - name: 의존성 설치
        run: |
          cd ${{ env.SERVICE_DIR }}
          pip install -e ".[dev]"

      - name: Ruff 린트
        run: |
          cd ${{ env.SERVICE_DIR }}
          ruff check app/ tests/

      - name: Ruff 포맷 검사
        run: |
          cd ${{ env.SERVICE_DIR }}
          ruff format --check app/ tests/

  test:
    name: 단위 테스트
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/olap-studio/pyproject.toml

      - name: 의존성 설치
        run: |
          cd ${{ env.SERVICE_DIR }}
          pip install -e ".[dev]"
          pip install numpy  # 테스트에서 사용

      - name: pytest 실행
        run: |
          cd ${{ env.SERVICE_DIR }}
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"

      - name: 테스트 결과 업로드
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ${{ env.SERVICE_DIR }}/test-results.xml

  build:
    name: Docker 이미지 빌드
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드
        run: |
          cd ${{ env.SERVICE_DIR }}
          docker build -t axiom/olap-studio:${{ github.sha }} .
          docker build -t axiom/olap-studio:latest .

      - name: 이미지 크기 확인
        run: docker images axiom/olap-studio
