# OLAP Studio Gateway 라우트
# /api/gateway/olap/* → olap-studio:8000/*
#
# 프로덕션 nginx 배포 시 http 블록의 server 내부에 include 한다.
# 개발 환경에서는 Vite dev server 프록시가 동일한 역할을 수행한다.

location /api/gateway/olap/ {
    proxy_pass http://olap-studio:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 인증 헤더 전달 (JWT, Tenant ID)
    proxy_pass_request_headers on;

    # 타임아웃 설정
    proxy_connect_timeout 5s;
    proxy_read_timeout 30s;
    proxy_send_timeout 10s;

    # 큰 페이로드 허용 (피벗 결과 등)
    client_max_body_size 10m;
}
